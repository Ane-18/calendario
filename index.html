<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FP Dual — ASIR+Cloud 2026-27</title>
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FP Dual">

<style>
:root {
  --bg: #0f1923;
  --surface: #172030;
  --surface2: #1e2d40;
  --surface3: #253448;
  --border: #2c3f58;
  --text: #dde8f5;
  --muted: #6a8baa;
  --accent-emp: #4a9de8;
  --accent-ik: #3dbf82;
  --accent-pam: #e8934a;
  --accent-fes: #e05858;
  --accent-vac-v: #3bbfa0;
  --accent-vac-n: #d4b03a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  max-width:500px;
  margin:0 auto;
  overflow-x:hidden;
}

/* ─── HEADER ─────────────────────────────────────────── */
.hdr{
  background:var(--surface);
  padding:14px 18px 10px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted)}
.hdr-today{font-size:12px;color:var(--muted)}

/* ─── SUMMARY CARDS ──────────────────────────────────── */
.summary{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:12px 14px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
.scard{
  background:var(--surface2);border-radius:12px;
  padding:11px 13px;
}
.scard-lbl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.scard-val{font-size:22px;font-weight:800;line-height:1}
.scard-val span{font-size:12px;font-weight:400;color:var(--muted);margin-left:1px}
.scard-sub{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
.bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* ─── MONTH NAV ──────────────────────────────────────── */
.mnav{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 8px;
}
.mnav-btn{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  width:38px;height:38px;border-radius:10px;
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .1s;
  user-select:none;
}
.mnav-btn:active{background:var(--border);transform:scale(.92)}
.mnav-btn:disabled{opacity:.3;cursor:default}
.mnav-label{font-size:20px;font-weight:800;letter-spacing:.2px;text-transform:capitalize}

/* ─── CALENDAR ───────────────────────────────────────── */
.cal-dows{
  display:grid;grid-template-columns:repeat(7,1fr);
  padding:0 12px;margin-bottom:3px;
}
.dow{
  text-align:center;font-size:10px;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;color:var(--muted);padding:2px 0;
}
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:3px;padding:0 12px 8px;
}
.cell{
  aspect-ratio:1;border-radius:9px;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:5px 5px 4px;
  position:relative;cursor:pointer;
  transition:transform .12s,box-shadow .12s;
  overflow:hidden;min-height:42px;
}
.cell:active{transform:scale(.9)}
.cell.inert{cursor:default}
.cell.inert:active{transform:none}

/* type colors */
.t-out    {background:#111923;opacity:.35}
.t-none   {background:#141e2b;cursor:default}
.t-weekend{background:#1a2535}
.t-festivo{background:rgba(224,88,88,.18);border:1px solid rgba(224,88,88,.3)}
.t-empresa{background:rgba(74,157,232,.2);border:1px solid rgba(74,157,232,.3)}
.t-pamplona{background:rgba(232,147,74,.22);border:1px solid rgba(232,147,74,.38)}
.t-dual{background:linear-gradient(135deg,rgba(74,157,232,.22) 50%,rgba(61,191,130,.22) 50%);border:1px solid rgba(74,157,232,.25)}
.t-ikastetxea{background:rgba(61,191,130,.2);border:1px solid rgba(61,191,130,.3)}
.t-vacacion_v{background:rgba(59,191,160,.2);border:1px solid rgba(59,191,160,.32)}
.t-vacacion_n{background:rgba(212,176,58,.2);border:1px solid rgba(212,176,58,.35)}

.cell.today{box-shadow:0 0 0 2.5px #fff,0 0 0 4px rgba(255,255,255,.15)}
.cell.is-start::after,.cell.is-end::after{
  content:'';position:absolute;top:3px;right:3px;
  width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4);
}

.dnum{font-size:14px;font-weight:700;line-height:1;color:var(--text)}
.t-out .dnum,.t-none .dnum,.t-weekend .dnum{color:var(--muted)}

.dhours{font-size:9px;font-weight:800;line-height:1.3;text-align:right}
.dhours .e{color:#6bbaff}
.dhours .i{color:#5dd69a}

/* ─── LEGEND ─────────────────────────────────────────── */
.legend{padding:12px 14px 16px}
.leg-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.leg-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px}
.leg-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.leg-swatch{width:14px;height:14px;border-radius:4px;flex-shrink:0;border:1px solid rgba(255,255,255,.08)}
.leg-swatch.dual-sw{background:linear-gradient(135deg,rgba(74,157,232,.6) 50%,rgba(61,191,130,.6) 50%)}

/* ─── OVERLAY / POPUP ────────────────────────────────── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.65);
  z-index:200;opacity:0;pointer-events:none;
  transition:opacity .25s;backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
}
.overlay.show{opacity:1;pointer-events:all}
.popup{
  position:fixed;bottom:0;left:50%;
  transform:translateX(-50%) translateY(102%);
  width:100%;max-width:500px;
  background:var(--surface);
  border-radius:22px 22px 0 0;
  padding:16px 20px calc(env(safe-area-inset-bottom,0px) + 28px);
  z-index:201;
  transition:transform .32s cubic-bezier(.34,1.2,.64,1);
  border-top:1px solid var(--border);
}
.popup.show{transform:translateX(-50%) translateY(0)}
.phandle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.pdate{font-size:13px;color:var(--muted);text-transform:capitalize;margin-bottom:5px}
.pbadge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  font-size:12px;font-weight:700;margin-bottom:16px;
  border:1px solid;
}
.prows{display:flex;flex-direction:column;gap:8px}
.prow{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;
  background:var(--surface2);border-radius:10px;
}
.prow-lbl{font-size:13px;color:var(--muted)}
.prow-val{font-size:15px;font-weight:700}
.psched{
  margin-top:10px;padding:11px 14px;
  background:var(--surface2);border-radius:10px;
  font-size:12px;color:var(--muted);line-height:1.6;
}
.psched strong{color:var(--text);font-weight:600}
</style>
</head>

/* ─── CONSTANTS ──────────────────────────────────────── */
const START = '2026-06-22';
const END   = '2027-06-21';
const TARGET_EMP_H = 1100, TARGET_IK_H = 400;
const TARGET_EMP_D = 226,  TARGET_IK_D = 100;

const MONTHS = [
  [2026,6],[2026,7],[2026,8],[2026,9],[2026,10],[2026,11],[2026,12],

            'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

/* ─── STATE ──────────────────────────────────────────── */
let curIdx = 0;

const todayDate = new Date();
const todayStr = [
  todayDate.getFullYear(),
  String(todayDate.getMonth()+1).padStart(2,'0'),
  String(todayDate.getDate()).padStart(2,'0')
].join('-');

/* ─── HELPERS ────────────────────────────────────────── */
function p2(n){ return String(n).padStart(2,'0'); }
function ds(y,m,d){ return `${y}-${p2(m)}-${p2(d)}`; }

function computeTotals(){
  let eH=0,iH=0,eD=0,iD=0;
  for(const [date,d] of Object.entries(CAL)){
    if(date < START || date > todayStr || date > END) continue;
    eH += d.empH; iH += d.ikH;
    if(d.empH > 0) eD++;
    if(d.ikH > 0) iD++;
  }
  return {eH,iH,eD,iD};
}

/* ─── RENDER SUMMARY ─────────────────────────────────── */
function renderSummary(){
  const {eH,iH,eD,iD} = computeTotals();
  const pE = Math.min(100, Math.round(eH/TARGET_EMP_H*100));
  const pI = Math.min(100, Math.round(iH/TARGET_IK_H*100));
  const periodStarted = todayStr >= START;

  document.getElementById('summary').innerHTML = `
    <div class="scard">
      <div class="scard-lbl">Empresa</div>
      <div class="scard-val" style="color:var(--accent-emp)">${eH}<span>h</span></div>
      <div class="scard-sub">${periodStarted ? TARGET_EMP_H-eH+'h restantes' : 'Período aún no iniciado'}<br>${eD} / ${TARGET_EMP_D} días</div>
      <div class="bar"><div class="bar-fill" style="width:${pE}%;background:var(--accent-emp)"></div></div>
    </div>
    <div class="scard">
      <div class="scard-lbl">Ikastetxea</div>
      <div class="scard-val" style="color:var(--accent-ik)">${iH}<span>h</span></div>
      <div class="scard-sub">${periodStarted ? TARGET_IK_H-iH+'h restantes' : 'Período aún no iniciado'}<br>${iD} / ${TARGET_IK_D} días</div>
      <div class="bar"><div class="bar-fill" style="width:${pI}%;background:var(--accent-ik)"></div></div>
    </div>`;

  const ty = todayDate.getFullYear(), tm = todayDate.getMonth()+1, td = todayDate.getDate();
  document.getElementById('hdr-today').textContent =
    `${td} ${MN[tm].slice(0,3)} ${ty}`;
}

/* ─── RENDER MONTH ───────────────────────────────────── */
function renderMonth(){
  const [year, month] = MONTHS[curIdx];
  document.getElementById('mnav-label').textContent = `${MN[month]} ${year}`;

  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  prevBtn.disabled = curIdx === 0;
  nextBtn.disabled = curIdx === MONTHS.length - 1;

  const firstDow = (new Date(year, month-1, 1).getDay() + 6) % 7; // Mon=0
  const lastDay  = new Date(year, month, 0).getDate();
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // leading blanks
  for(let i = 0; i < firstDow; i++){
    const el = document.createElement('div');
    el.className = 'cell t-none inert';
    grid.appendChild(el);
  }

  for(let d = 1; d <= lastDay; d++){
    const dateStr = ds(year, month, d);
    const day = CAL[dateStr] || {type:'none',empH:0,ikH:0,schedule:''};
    const t = day.type;

    const el = document.createElement('div');
    el.className = `cell t-${t}`;
    if(t === 'out' || t === 'none') el.classList.add('inert');
    if(dateStr === todayStr) el.classList.add('today');
    if(dateStr === START) el.classList.add('is-start');
    if(dateStr === END)   el.classList.add('is-end');

    let hoursHtml = '';
    if(day.empH > 0 || day.ikH > 0){
      let parts = '';
      if(day.empH > 0) parts += `<span class="e">${day.empH}h</span>`;
      if(day.ikH  > 0) parts += (parts ? '<br>' : '') + `<span class="i">${day.ikH}h</span>`;
      hoursHtml = `<div class="dhours">${parts}</div>`;
    } else {
      hoursHtml = '<div class="dhours"></div>';
    }

    el.innerHTML = `<span class="dnum">${d}</span>${hoursHtml}`;

    if(t !== 'out' && t !== 'none'){
      el.addEventListener('click', () => openPopup(dateStr, day, d, year, month));
    }

    grid.appendChild(el);
  }

  // trailing blanks
  const total = firstDow + lastDay;
  const rem = total % 7;
  if(rem > 0){
    for(let i = rem; i < 7; i++){
      const el = document.createElement('div');
      el.className = 'cell t-none inert';
      grid.appendChild(el);
    }
  }
}

function renderLegend(){
  const items = [
    ['empresa',    'Empresa'],
    ['pamplona',   'Pamplona'],

    ['festivo',    'Festivo'],
    ['vacacion_v', 'Vacaciones'],
    ['vacacion_n', 'Vac. cambio'],
    ['weekend',    'Fin de semana'],
  ];

  const swatchStyle = t => {
    const c = TYPE_META[t].color;
    if(t === 'dual') return 'class="leg-swatch dual-sw"';
    return `class="leg-swatch" style="background:${c}44;border-color:${c}66"`;
  };

  document.getElementById('legend').innerHTML = `
    <div class="leg-title">Leyenda</div>
    <div class="leg-grid">
      ${items.map(([t,lbl]) => `
        <div class="leg-item">
          <div ${swatchStyle(t)}></div>
          <span>${lbl}</span>
        </div>`).join('')}
    </div>`;
}

function openPopup(dateStr, day, dayNum, year, month){
  const weekday = DN[new Date(year, month-1, dayNum).getDay()];
  const dateLabel = `${weekday}, ${dayNum} de ${MN[month].toLowerCase()} de ${year}`;
  const meta = TYPE_META[day.type] || TYPE_META.none;
  const c = meta.color;

  let rows = '';
  if(day.empH > 0){
    rows += `<div class="prow">
      <span class="prow-lbl">⚙ Empresa</span>
      <span class="prow-val" style="color:var(--accent-emp)">${day.empH} h</span>
    </div>`;
  }
  if(day.ikH > 0){
    rows += `<div class="prow">
      <span class="prow-lbl">📚 Ikastetxea</span>
      <span class="prow-val" style="color:var(--accent-ik)">${day.ikH} h</span>
    </div>`;
  }
  if(!rows){
    rows = `<div class="prow"><span class="prow-lbl">Sin horas programadas</span></div>`;
  }

  let schedHtml = '';
  if(day.schedule){
    const parts = day.schedule.split(' / ');
    schedHtml = `<div class="psched">${parts.map(p => `<strong>🕐</strong> ${p}`).join('<br>')}</div>`;
  }

  // cumulative up to this date
  let cumEmp = 0, cumIk = 0;
  for(const [dt, d] of Object.entries(CAL)){
    if(dt < START || dt > dateStr || dt > END) continue;
    cumEmp += d.empH; cumIk += d.ikH;
  }
  const cumHtml = (day.empH > 0 || day.ikH > 0)
    ? `<div class="prow" style="margin-top:6px;opacity:.7">
        <span class="prow-lbl" style="font-size:11px">Acumulado hasta aquí</span>
        <span class="prow-val" style="font-size:12px">${cumEmp}h emp · ${cumIk}h ik</span>
       </div>`
    : '';

  document.getElementById('popup-body').innerHTML = `
    <div class="pdate">${dateLabel}</div>
    <div class="pbadge" style="color:${c};background:${c}22;border-color:${c}44">${meta.label}</div>
    <div class="prows">${rows}${cumHtml}</div>
    ${schedHtml}`;

  document.getElementById('overlay').classList.add('show');
  document.getElementById('popup').classList.add('show');
}

function closePopup(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('popup').classList.remove('show');
}

/* ─── INIT ───────────────────────────────────────────── */
(function init(){
  // Start on today's month if within range
  const ty = todayDate.getFullYear(), tm = todayDate.getMonth()+1;
  const idx = MONTHS.findIndex(([y,m]) => y===ty && m===tm);
  curIdx = idx >= 0 ? idx : 0;

  renderSummary();
  renderMonth();
  renderLegend();

  document.getElementById('prev-btn').addEventListener('click', () => {
    if(curIdx > 0){ curIdx--; renderMonth(); }
  });
  document.getElementById('next-btn').addEventListener('click', () => {
    if(curIdx < MONTHS.length-1){ curIdx++; renderMonth(); }
  });

  document.getElementById('overlay').addEventListener('click', closePopup);

  // swipe navigation
  let tx = 0;
  const body = document.body;
  body.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
  body.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    if(Math.abs(dx) > 60){
      if(dx < 0 && curIdx < MONTHS.length-1){ curIdx++; renderMonth(); }
      if(dx > 0 && curIdx > 0){ curIdx--; renderMonth(); }
    }
  }, {passive:true});
})();
</script>
